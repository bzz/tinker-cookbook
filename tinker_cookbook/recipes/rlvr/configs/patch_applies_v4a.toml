# RLVR config for patch application (reward = patch applies without error)
# Cold start on instruct model directly, without SFT (!) \w 1.0 temp
env_class = "tinker_cookbook.recipes.rlvr.patch_env:PatchAppliesEnv"
chkpt_name_prefix = "Qwen3-4B-Inst_v4a-applies"

dataset_name = "bzz2/diff-xyz-v4a"
dataset_config = "easy"
dataset_split = "validation"

user_template = "v4a_instruct.txt"

answer_field = "new_code"

model_name = "Qwen/Qwen3-4B-Instruct-2507"
batch_size = 8
group_size = 4
learning_rate = 1e-5
temperature=1.0
max_tokens = 2048
lora_rank = 32

eval_every = 10
save_every = 15
wandb_project = "tinker-diff_gen_v4a-rl"

